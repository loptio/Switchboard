# Alembic configuration. The database URL is NOT stored here — alembic/env.py
# reads it from the DATABASE_URL environment variable so credentials never enter
# code or Git.

[alembic]
script_location = alembic
prepend_sys_path = .
# Migration filenames: <NNNN>_<slug>.py
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
